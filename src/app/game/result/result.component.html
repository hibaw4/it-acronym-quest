<div class="max-w-2xl mx-auto mt-8">
  <app-card [elevation]="4" [@resultCardAnimation]>
    <div class="text-center py-12" *ngIf="quizState">
      <h1 class="text-4xl font-bold mb-6" [@titleAnimation]>Quiz Complete!</h1>
      
      <div class="text-6xl mb-6" [@titleAnimation]>
        {{ performanceMessage.split(' ')[0] }}
      </div>
      
      <p class="text-2xl mb-8" [@titleAnimation]>{{ performanceMessage.substring(performanceMessage.indexOf(' ') + 1) }}</p>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-8" [@statsAnimation]>
        <div class="bg-blue-50 p-6 rounded-lg stat-card">
          <p class="text-3xl font-bold text-blue-600">{{ quizState.score }}</p>
          <p class="text-sm text-gray-600">Total Score</p>
        </div>
        
        <div class="bg-green-50 p-6 rounded-lg stat-card">
          <p class="text-3xl font-bold text-green-600">{{ quizState.correctAnswers }}</p>
          <p class="text-sm text-gray-600">Correct</p>
        </div>
        
        <div class="bg-red-50 p-6 rounded-lg stat-card">
          <p class="text-3xl font-bold text-red-600">{{ quizState.incorrectAnswers }}</p>
          <p class="text-sm text-gray-600">Incorrect</p>
        </div>
      </div>

      <!-- Percentage Circle -->
      <div class="mb-8" [@circleAnimation]>
        <div class="inline-block">
          <svg class="transform -rotate-90 w-32 h-32">
            <circle cx="64" cy="64" r="56" stroke="currentColor" 
                    stroke-width="8" fill="transparent"
                    class="text-gray-200"></circle>
            <circle cx="64" cy="64" r="56" stroke="currentColor" 
                    stroke-width="8" fill="transparent"
                    [attr.stroke-dasharray]="2 * 3.14159 * 56"
                    [attr.stroke-dashoffset]="2 * 3.14159 * 56 * (1 - percentage / 100)"
                    class="text-primary"></circle>
          </svg>
          <p class="text-2xl font-bold -mt-20 text-center">{{ percentage | number:'1.0-0' }}%</p>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex gap-4 justify-center" [@buttonAnimation]>
        <button mat-raised-button color="primary" (click)="playAgain()">
          <mat-icon>replay</mat-icon>
          Play Again
        </button>
        
        <button mat-button routerLink="/admin">
          <mat-icon>settings</mat-icon>
          Manage Acronyms
        </button>
      </div>
    </div>
  </app-card>
</div>
