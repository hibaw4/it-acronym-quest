<div class="max-w-6xl mx-auto mt-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Acronyms Management</h1>
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <mat-icon>add</mat-icon>
      Add New Acronym
    </button>
  </div>

  <app-card [elevation]="2">
    <table mat-table [dataSource]="acronyms" class="w-full">
      <!-- Abbreviation Column -->
      <ng-container matColumnDef="abbreviation">
        <th mat-header-cell *matHeaderCellDef class="font-bold">Abbreviation</th>
        <td mat-cell *matCellDef="let element">{{ element.abbreviation }}</td>
      </ng-container>

      <!-- Full Term Column -->
      <ng-container matColumnDef="fullTerm">
        <th mat-header-cell *matHeaderCellDef class="font-bold">Full Term</th>
        <td mat-cell *matCellDef="let element">{{ element.fullTerm }}</td>
      </ng-container>

      <!-- Category Column -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef class="font-bold">Category</th>
        <td mat-cell *matCellDef="let element">
          <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-sm">
            {{ element.category }}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="font-bold">Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="openEditDialog(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteAcronym(element.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="acronyms.length === 0" class="text-center py-8 text-gray-500">
      <mat-icon class="text-6xl mb-4">inbox</mat-icon>
      <p>No acronyms yet. Add your first one!</p>
    </div>
  </app-card>
</div>
